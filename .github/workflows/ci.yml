# CI workflow for chirag127/oriz-blog-site — generated from
# templates/per-site-ci/ in the master oriz repo. DO NOT hand-edit
# inside the submodule; edit the template and re-apply via the
# `runbooks/apply-per-site-ci.md` runbook.
#
# Replace blog-site below with the repo's own slug (e.g. blog, books,
# me, finance) before committing.
#
# ─── Build cache strategy ───────────────────────────────────────────
# Two cache buckets per repo, free 10 GB total:
#   1. pnpm store — keyed by `pnpm-lock.yaml` hash, fuzzy-fallback to
#      most-recent `pnpm-store-` cache when the lockfile changes.
#   2. Astro build — keyed by `astro.config.* + src/** + public/**` hash
#      so source edits invalidate but unrelated repo changes don't.
# Layer 1 (per-developer-machine) is the pnpm content-addressable
# global store, already family-default via `rules/use-pnpm.md`.
# Turbo Remote Cache + Bazel + Nx Cloud REJECTED — see
# `decisions/architecture/build-cache-gh-actions-plus-pnpm.md`.
# Cache-eviction escape hatch: bump `pnpm-store-` to `pnpm-store-v2-`
# (and same for `astro-`) per `runbooks/clean-install.md`.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "latest"

jobs:
  lint:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm exec biome check .

  typecheck:
    name: typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: TypeScript --noEmit
        run: pnpm exec tsc --noEmit

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.astro
            .astro
          key: ${{ runner.os }}-astro-${{ hashFiles('astro.config.*', 'src/**/*', 'public/**/*') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            dist
            build
            .output
            out
          if-no-files-found: warn
          retention-days: 7

  deploy-cf:
    name: deploy (cloudflare pages)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: oriz-blog-site
          # Common output dirs across the family — pick one per site:
          #   Astro: dist
          #   Next (static): out
          #   Vite: dist
          #   Nuxt: .output/public
          # Default to "dist"; override per-repo if needed.
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
